    <circle cx="940" cy="145" r="4.5" fill="#DB2777" opacity="0.50"/>
    <circle cx="940" cy="190" r="4.5" fill="#DB2777" opacity="0.50"/>
    <circle cx="940" cy="235" r="4.5" fill="#DB2777" opacity="0.50"/>
    <circle cx="940" cy="265" r="4.5" fill="#DB2777" opacity="0.50"/>

    <!-- Hidden 3 - #F472B6 -->
    <circle cx="830" cy="75" r="4" fill="#F472B6" opacity="0.50"/>
    <circle cx="830" cy="125" r="4" fill="#F472B6" opacity="0.50"/>
    <circle cx="830" cy="170" r="4" fill="#F472B6" opacity="0.50"/>
    <circle cx="830" cy="215" r="4" fill="#F472B6" opacity="0.50"/>
    <circle cx="830" cy="255" r="4" fill="#F472B6" opacity="0.50"/>

    <!-- Output - #FBCFE8 -->
    <circle cx="730" cy="100" r="5" fill="#FBCFE8" opacity="0.65">
      <animate attributeName="r" values="5;5.8;5" dur="3s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="730" cy="155" r="5" fill="#FBCFE8" opacity="0.65">
      <animate attributeName="r" values="5;5.8;5" dur="3.2s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="730" cy="210" r="5" fill="#FBCFE8" opacity="0.65">
