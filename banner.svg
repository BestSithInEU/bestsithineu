    <circle cx="80" cy="180" r="5" fill="#818CF8" opacity="0.7">
      <animate attributeName="r" values="5;5.8;5" dur="3.4s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="80" cy="230" r="5" fill="#818CF8" opacity="0.7">
      <animate attributeName="r" values="5;5.8;5" dur="3.6s" begin="0.9s" repeatCount="indefinite"/></circle>

    <!-- Hidden 1 - #6366F1 -->
    <circle cx="160" cy="65" r="4" fill="#6366F1" opacity="0.6"/>
    <circle cx="160" cy="110" r="4" fill="#6366F1" opacity="0.6"/>
    <circle cx="160" cy="155" r="4" fill="#6366F1" opacity="0.6"/>
    <circle cx="160" cy="200" r="4" fill="#6366F1" opacity="0.6"/>
    <circle cx="160" cy="245" r="4" fill="#6366F1" opacity="0.6"/>

    <!-- Hidden 2 - #8B5CF6 -->
