    <path d="M160,65 C210,65 210,55 260,55" stroke-opacity="0.22"/>
    <path d="M160,65 C210,70 210,100 260,100" stroke-opacity="0.18"/>
    <path d="M160,110 C210,110 210,100 260,100" stroke-opacity="0.22"/>
    <path d="M160,110 C210,115 210,145 260,145" stroke-opacity="0.15"/>
