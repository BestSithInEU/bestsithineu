  <!-- ANIMATED PULSES (left → center) -->
  <circle r="3" fill="#818CF8" filter="url(#glow)" opacity="0">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M80,130 C120,130 120,110 160,110 C210,110 210,100 260,100 C315,100 315,75 370,75 C420,80 420,100 470,100"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0.9;0" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;3.5;3;3.5;2" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="#6366F1" filter="url(#glow)" opacity="0">
    <animateMotion dur="4s" begin="1.5s" repeatCount="indefinite" path="M80,230 C120,230 120,200 160,200 C210,200 210,190 260,190 C315,190 315,170 370,170 C420,175 420,210 470,210"/>
