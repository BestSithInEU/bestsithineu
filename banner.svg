    <path d="M830,75 C780,80 780,100 730,100" stroke-opacity="0.22"/>
    <path d="M830,125 C780,125 780,100 730,100" stroke-opacity="0.18"/>
    <path d="M830,125 C780,130 780,155 730,155" stroke-opacity="0.22"/>
    <path d="M830,170 C780,170 780,155 730,155" stroke-opacity="0.15"/>
    <path d="M830,215 C780,210 780,210 730,210" stroke-opacity="0.22"/>
