    <animate attributeName="opacity" values="0;0.9;0.9;0.9;0" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;3.5;3;3.5;2" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="#EC4899" filter="url(#glow)" opacity="0">
