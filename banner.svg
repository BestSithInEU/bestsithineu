    <circle cx="260" cy="100" r="4.5" fill="#8B5CF6" opacity="0.55"/>
    <circle cx="260" cy="145" r="4.5" fill="#8B5CF6" opacity="0.55"/>
    <circle cx="260" cy="190" r="4.5" fill="#8B5CF6" opacity="0.55"/>
    <circle cx="260" cy="235" r="4.5" fill="#8B5CF6" opacity="0.55"/>
    <circle cx="260" cy="265" r="4.5" fill="#8B5CF6" opacity="0.55"/>

    <!-- Hidden 3 - #A78BFA -->
    <circle cx="370" cy="75" r="4" fill="#A78BFA" opacity="0.55"/>
    <circle cx="370" cy="125" r="4" fill="#A78BFA" opacity="0.55"/>
    <circle cx="370" cy="170" r="4" fill="#A78BFA" opacity="0.55"/>
    <circle cx="370" cy="215" r="4" fill="#A78BFA" opacity="0.55"/>
    <circle cx="370" cy="255" r="4" fill="#A78BFA" opacity="0.55"/>

    <!-- Output - #C4B5FD -->
    <circle cx="470" cy="100" r="5" fill="#C4B5FD" opacity="0.7">
      <animate attributeName="r" values="5;5.8;5" dur="3s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="470" cy="155" r="5" fill="#C4B5FD" opacity="0.7">
      <animate attributeName="r" values="5;5.8;5" dur="3.2s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="470" cy="210" r="5" fill="#C4B5FD" opacity="0.7">
      <animate attributeName="r" values="5;5.8;5" dur="3.4s" begin="0.6s" repeatCount="indefinite"/></circle>
