  <!-- CENTER TEXT -->
  <text x="600" y="140" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="52" font-weight="700" fill="url(#nameGrad)" filter="url(#textGlow)" opacity="0.3">Batuhan Edgüer</text>
  <text x="600" y="140" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="52" font-weight="700" fill="url(#nameGrad)">Batuhan Edgüer</text>
  <text x="600" y="175" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="400" fill="url(#subtitleGrad)" opacity="0.8">AI Researcher &amp; ML Engineer</text>
  <line x1="510" y1="195" x2="690" y2="195" stroke="url(#nameGrad)" stroke-width="1.5" stroke-opacity="0.4">
    <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
  </line>
  <text x="600" y="215" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" fill="#8b949e" opacity="0.6">Istanbul, Turkey</text>

  <rect x="0" y="280" width="1200" height="40" fill="url(#bg)" opacity="0.7"/>
