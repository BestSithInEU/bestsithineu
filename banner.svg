  <ellipse cx="830" cy="160" rx="18" ry="110" fill="#F472B6" opacity="0.04" filter="url(#layerGlow)"/>
  <ellipse cx="730" cy="160" rx="18" ry="90" fill="#FBCFE8" opacity="0.04" filter="url(#layerGlow)"/>

