    <path d="M160,245 C210,240 210,265 260,265" stroke-opacity="0.18"/>
    <path d="M160,65 C210,80 210,190 260,190" stroke-opacity="0.08"/>
    <path d="M160,245 C210,230 210,100 260,100" stroke-opacity="0.08"/>

