    <path d="M370,75 C420,80 420,100 470,100" stroke-opacity="0.22"/>
    <path d="M370,125 C420,125 420,100 470,100" stroke-opacity="0.18"/>
    <path d="M370,125 C420,130 420,155 470,155" stroke-opacity="0.22"/>
    <path d="M370,170 C420,170 420,155 470,155" stroke-opacity="0.15"/>
    <path d="M370,215 C420,210 420,210 470,210" stroke-opacity="0.22"/>
    <path d="M370,255 C420,250 420,210 470,210" stroke-opacity="0.18"/>
