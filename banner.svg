<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="subtitleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A5B4FC"/>
      <stop offset="100%" stop-color="#F9A8D4"/>
    </linearGradient>
    <linearGradient id="edgeGradL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="edgeGradR" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#F9A8D4"/>
      <stop offset="100%" stop-color="#FBCFE8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <filter id="layerGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- LEFT NETWORK -->
  <!-- Subtle layer glow bands -->
  <ellipse cx="80" cy="160" rx="18" ry="100" fill="#818CF8" opacity="0.04" filter="url(#layerGlow)"/>
  <ellipse cx="160" cy="160" rx="18" ry="110" fill="#6366F1" opacity="0.05" filter="url(#layerGlow)"/>
  <ellipse cx="260" cy="160" rx="18" ry="120" fill="#8B5CF6" opacity="0.05" filter="url(#layerGlow)"/>
  <ellipse cx="370" cy="160" rx="18" ry="110" fill="#A78BFA" opacity="0.04" filter="url(#layerGlow)"/>
  <ellipse cx="470" cy="160" rx="18" ry="90" fill="#C4B5FD" opacity="0.04" filter="url(#layerGlow)"/>

  <!-- Left edges (selective, curved) -->
  <g stroke="url(#edgeGradL)" fill="none" stroke-width="0.8">
