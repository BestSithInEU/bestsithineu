    <path d="M260,55 C315,55 315,75 370,75" stroke-opacity="0.22"/>
    <path d="M260,100 C315,100 315,75 370,75" stroke-opacity="0.18"/>
    <path d="M260,100 C315,105 315,125 370,125" stroke-opacity="0.22"/>
    <path d="M260,145 C315,145 315,125 370,125" stroke-opacity="0.15"/>
    <path d="M260,145 C315,150 315,170 370,170" stroke-opacity="0.22"/>
    <path d="M260,190 C315,190 315,170 370,170" stroke-opacity="0.18"/>
    <path d="M260,190 C315,195 315,215 370,215" stroke-opacity="0.22"/>
    <path d="M260,235 C315,235 315,215 370,215" stroke-opacity="0.15"/>
    <path d="M260,265 C315,265 315,255 370,255" stroke-opacity="0.22"/>
    <path d="M260,235 C315,240 315,255 370,255" stroke-opacity="0.18"/>

