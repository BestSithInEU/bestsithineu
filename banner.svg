    <path d="M1120,130 C1080,130 1080,65 1040,65" stroke-opacity="0.15"/>
    <path d="M1120,130 C1080,130 1080,110 1040,110" stroke-opacity="0.22"/>
    <path d="M1120,130 C1080,135 1080,155 1040,155" stroke-opacity="0.20"/>
    <path d="M1120,180 C1080,180 1080,155 1040,155" stroke-opacity="0.22"/>
    <path d="M1120,180 C1080,180 1080,200 1040,200" stroke-opacity="0.18"/>
    <path d="M1120,230 C1080,230 1080,200 1040,200" stroke-opacity="0.22"/>
    <path d="M1120,230 C1080,230 1080,245 1040,245" stroke-opacity="0.20"/>
    <path d="M1120,80 C1080,90 1080,155 1040,155" stroke-opacity="0.10"/>
