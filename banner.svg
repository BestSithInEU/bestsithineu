  </circle>
  <circle r="2.5" fill="#A78BFA" filter="url(#glow)" opacity="0">
    <animateMotion dur="4.2s" begin="0.8s" repeatCount="indefinite" path="M80,80 C120,80 120,65 160,65 C210,65 210,55 260,55 C315,55 315,75 370,75 C420,80 420,100 470,100"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0.8;0" dur="4.2s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

