<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60" width="1200" height="60">
  <defs>
    <linearGradient id="footerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="60" fill="url(#bg)"/>
  <line x1="200" y1="25" x2="1000" y2="25" stroke="url(#footerGrad)" stroke-width="1" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.15;0.4;0.15" dur="4s" repeatCount="indefinite"/>
  </line>
  <circle cx="600" cy="25" r="3" fill="url(#footerGrad)" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="580" cy="25" r="1.5" fill="#6366F1" opacity="0.3"/>
  <circle cx="620" cy="25" r="1.5" fill="#EC4899" opacity="0.3"/>
  <text x="600" y="48" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#8b949e" opacity="0.4">bestsithineu.github.io</text>
</svg>
