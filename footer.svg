<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" width="1200" height="160">
  <defs>
    <linearGradient id="footerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="40%" stop-color="#0d1117" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="160" fill="url(#bg)"/>

  <!-- Top decorative line -->
  <line x1="100" y1="30" x2="1100" y2="30" stroke="url(#footerGrad)" stroke-width="0.8" stroke-opacity="0.15"/>

  <!-- Floating particles left side -->
  <circle cx="80" cy="50" r="1.5" fill="#6366F1" opacity="0.3">
    <animate attributeName="cy" values="50;40;50" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="70" r="1" fill="#818CF8" opacity="0.25">
    <animate attributeName="cy" values="70;58;70" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.4;0.15" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="220" cy="45" r="2" fill="#A78BFA" opacity="0.2">
    <animate attributeName="cy" values="45;35;45" dur="5s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.35;0.1" dur="5s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="310" cy="65" r="1.2" fill="#6366F1" opacity="0.3">
    <animate attributeName="cy" values="65;52;65" dur="3.8s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="40" r="1.5" fill="#818CF8" opacity="0.2">
    <animate attributeName="cy" values="40;30;40" dur="4.2s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.4;0.15" dur="4.2s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating particles right side -->
  <circle cx="800" cy="55" r="1.5" fill="#EC4899" opacity="0.3">
    <animate attributeName="cy" values="55;43;55" dur="4.3s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4.3s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="880" cy="42" r="1" fill="#F9A8D4" opacity="0.25">
    <animate attributeName="cy" values="42;32;42" dur="3.6s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="960" cy="68" r="2" fill="#EC4899" opacity="0.2">
    <animate attributeName="cy" values="68;55;68" dur="4.8s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.35;0.1" dur="4.8s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="48" r="1.2" fill="#F9A8D4" opacity="0.3">
    <animate attributeName="cy" values="48;38;48" dur="3.9s" begin="0.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1120" cy="60" r="1.5" fill="#EC4899" opacity="0.2">
    <animate attributeName="cy" values="60;48;60" dur="4.5s" begin="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.4;0.15" dur="4.5s" begin="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Center floating particles -->
  <circle cx="500" cy="50" r="1" fill="#8B5CF6" opacity="0.2">
    <animate attributeName="cy" values="50;38;50" dur="4s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="45" r="1.3" fill="#8B5CF6" opacity="0.25">
    <animate attributeName="cy" values="45;33;45" dur="3.7s" begin="1.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Main gradient line with traveling pulse -->
  <line x1="150" y1="85" x2="1050" y2="85" stroke="url(#footerGrad)" stroke-width="1.5" stroke-opacity="0.25">
    <animate attributeName="stroke-opacity" values="0.15;0.35;0.15" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- Traveling pulse on the line -->
  <circle r="4" fill="#6366F1" filter="url(#glow)" opacity="0">
    <animateMotion dur="3s" repeatCount="indefinite" path="M150,85 L1050,85"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;4;2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#EC4899" filter="url(#glow)" opacity="0">
    <animateMotion dur="3.5s" begin="1.5s" repeatCount="indefinite" path="M1050,85 L150,85"/>
    <animate attributeName="opacity" values="0;0.5;0.5;0" dur="3.5s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Node dots on the line -->
  <circle cx="150" cy="85" r="3" fill="#6366F1" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="330" cy="85" r="2" fill="#818CF8" opacity="0.35"/>
  <circle cx="510" cy="85" r="2" fill="#8B5CF6" opacity="0.35"/>
  <circle cx="600" cy="85" r="3.5" fill="url(#footerGrad)" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3.5;4.2;3.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="690" cy="85" r="2" fill="#8B5CF6" opacity="0.35"/>
  <circle cx="870" cy="85" r="2" fill="#F9A8D4" opacity="0.35"/>
  <circle cx="1050" cy="85" r="3" fill="#EC4899" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Connection lines from center node -->
  <line x1="600" y1="85" x2="510" y2="85" stroke="#6366F1" stroke-opacity="0.1" stroke-width="0.5"/>
  <line x1="600" y1="85" x2="690" y2="85" stroke="#EC4899" stroke-opacity="0.1" stroke-width="0.5"/>

  <!-- Site URL -->
  <text x="600" y="120" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12" fill="#8b949e" opacity="0.5">bestsithineu.github.io</text>

  <!-- Bottom subtle line -->
  <line x1="250" y1="140" x2="950" y2="140" stroke="url(#footerGrad)" stroke-width="0.5" stroke-opacity="0.08"/>
</svg>
