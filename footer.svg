<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200">
  <defs>

    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#070a12" />
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>

    <!-- Soft glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Fade -->
    <linearGradient id="fade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#070a12" />
      <stop offset="100%" stop-color="#070a12" stop-opacity="0" />
    </linearGradient>

  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bg)" />

  <!-- Main animated wave -->
  <path
    d="M0 140 C150 100 300 160 450 120 C600 80 750 150 900 120 C1050 90 1150 120 1200 110"
    fill="none"
    stroke="url(#accent)"
    stroke-width="2"
    opacity="0.35"
    filter="url(#glow)"
  >
    <animate
      attributeName="d"
      dur="9s"
      repeatCount="indefinite"
      values="
      M0 140 C150 100 300 160 450 120 C600 80 750 150 900 120 C1050 90 1150 120 1200 110;
      M0 120 C150 150 300 110 450 140 C600 170 750 100 900 130 C1050 160 1150 130 1200 140;
      M0 140 C150 100 300 160 450 120 C600 80 750 150 900 120 C1050 90 1150 120 1200 110
      "
    />
  </path>

  <!-- subtle second layer -->
  <path
    d="M0 150 C200 130 400 170 600 140 C800 110 1000 160 1200 140"
    fill="none"
    stroke="#8B5CF6"
    stroke-width="1"
    opacity="0.15"
  />

  <!-- center label -->
  <text
    x="600"
    y="110"
    text-anchor="middle"
    font-family="JetBrains Mono, Fira Code, monospace"
    font-size="15"
    fill="#A5B4FC"
    opacity="0.7">
    model.predict(future)
  </text>

  <!-- bottom fade -->
  <rect x="0" y="160" width="1200" height="40" fill="url(#fade)" />

  <!-- subtle bottom line -->
  <line
    x1="0"
    y1="199"
    x2="1200"
    y2="199"
    stroke="url(#accent)"
    stroke-opacity="0.2"
  />

</svg>
